<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TKJ·AI — Guru Digital SMK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Orbitron:wght@400;600;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Pacifico&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--tr:0.4s cubic-bezier(0.4,0,0.2,1);--sidebar-w:270px}

/* ── TECH THEME ── */
[data-theme="tech"]{
  --bg:#060b18;--bg2:#0c1428;--bg3:#0f1a30;--card:#0d1525;--inp:#121e35;
  --A:#00e5ff;--A2:#7c3aed;--A3:#10f59a;
  --txt:#d4e8ff;--txt2:#7898bf;--txt3:#3a5278;
  --bdr:rgba(0,229,255,0.15);--bdr2:rgba(0,229,255,0.5);
  --glow:0 0 24px rgba(0,229,255,0.35);--glow2:0 0 60px rgba(0,229,255,0.55),0 0 120px rgba(0,229,255,0.2);
  --ubbl:linear-gradient(135deg,#7c3aed,#4338ca);--abbl:#0d1525;--abblb:rgba(0,229,255,0.25);
  --sb:#00e5ff;--fd:'Orbitron',monospace;--fb:'JetBrains Mono',monospace;--fc:'JetBrains Mono',monospace;
  --hg:linear-gradient(160deg,#060b18,#0c1428);
  --bp:radial-gradient(ellipse at 15% 50%,rgba(0,229,255,0.07) 0%,transparent 60%),
       radial-gradient(ellipse at 85% 15%,rgba(124,58,237,0.07) 0%,transparent 60%);
  --spbg:linear-gradient(160deg,#060b18,#0c1428,#060b18);
  --sidebar-bg:#070d1f;--sidebar-bdr:rgba(0,229,255,0.1);
}

/* ── HACKING THEME ── */
[data-theme="hack"]{
  --bg:#000;--bg2:#030303;--bg3:#060606;--card:#080808;--inp:#0c0c0c;
  --A:#00ff41;--A2:#00cc33;--A3:#39ff14;
  --txt:#00ff41;--txt2:#008f24;--txt3:#004d13;
  --bdr:rgba(0,255,65,0.15);--bdr2:rgba(0,255,65,0.55);
  --glow:0 0 20px rgba(0,255,65,0.45);--glow2:0 0 70px rgba(0,255,65,0.65),0 0 140px rgba(0,255,65,0.2);
  --ubbl:#001400;--abbl:#000;--abblb:rgba(0,255,65,0.35);
  --sb:#00ff41;--fd:'Space Mono',monospace;--fb:'Space Mono',monospace;--fc:'Space Mono',monospace;
  --hg:#000;--bp:none;--spbg:#000;
  --sidebar-bg:#020202;--sidebar-bdr:rgba(0,255,65,0.1);
}

/* ── GIRLY THEME ── */
[data-theme="girly"]{
  --bg:#fff0f6;--bg2:#ffe4ef;--bg3:#ffd6e8;--card:#fff;--inp:#fff5f9;
  --A:#ff3d82;--A2:#c879ff;--A3:#ff85b3;
  --txt:#5c1535;--txt2:#9b4468;--txt3:#c984a4;
  --bdr:rgba(255,61,130,0.2);--bdr2:rgba(255,61,130,0.55);
  --glow:0 4px 20px rgba(255,61,130,0.2);--glow2:0 8px 50px rgba(255,61,130,0.4),0 0 80px rgba(200,121,255,0.2);
  --ubbl:linear-gradient(135deg,#ff3d82,#c879ff);--abbl:#fff;--abblb:rgba(255,61,130,0.25);
  --sb:#ff3d82;--fd:'Pacifico',cursive;--fb:'Quicksand',sans-serif;--fc:'Quicksand',sans-serif;
  --hg:linear-gradient(135deg,#ffcce0,#f5b8d8,#e8b4ff);
  --bp:radial-gradient(ellipse at 10% 80%,rgba(255,61,130,0.1) 0%,transparent 55%),
       radial-gradient(ellipse at 90% 10%,rgba(200,121,255,0.1) 0%,transparent 55%);
  --spbg:linear-gradient(135deg,#ffe0ee,#f9cfeb,#ecdaff);
  --sidebar-bg:#fff5f9;--sidebar-bdr:rgba(255,61,130,0.15);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;height:-webkit-fill-available}
body{
  background:var(--bg);
  background-image:var(--bp);
  color:var(--txt);
  font-family:var(--fb);
  font-size:14px;
  transition:background var(--tr),color var(--tr);
  height:100vh;
  height:-webkit-fill-available;
  overflow:hidden;
  position:fixed;
  width:100%;
}

/* ── FX LAYERS ── */
#fx-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0;transition:opacity .6s}
[data-theme="hack"] #fx-canvas{opacity:.08}
#grid-ol{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:48px 48px;
  opacity:0;transition:opacity .6s;
}
[data-theme="tech"] #grid-ol{opacity:1}
/* Girly floating decos — ONLY visible in girly theme, fully hidden otherwise */
.deco{display:none;position:fixed;pointer-events:none;z-index:0;font-size:22px;animation:floatup 10s linear infinite}
[data-theme="girly"] .deco{display:block}
@keyframes floatup{0%{transform:translateY(105vh) rotate(0deg);opacity:0}8%{opacity:.18}90%{opacity:.18}100%{transform:translateY(-60px) rotate(360deg);opacity:0}}
#scan-bar{position:fixed;left:0;right:0;height:2px;background:var(--A);z-index:999;opacity:0;pointer-events:none;animation:scan 5s linear infinite}
[data-theme="hack"] #scan-bar{opacity:.4}
@keyframes scan{0%{top:0}100%{top:100%}}

/* ══ SPLASH ══ */
#splash{position:fixed;inset:0;z-index:200;background:var(--spbg);display:flex;align-items:center;justify-content:center;transition:opacity .65s,transform .65s;overflow-y:auto;-webkit-overflow-scrolling:touch}
#splash.hide{opacity:0;transform:scale(1.04);pointer-events:none}
.sp-inner{display:flex;flex-direction:column;align-items:center;gap:24px;padding:36px 24px;max-width:440px;width:100%;animation:spIn .8s cubic-bezier(.2,.8,.3,1) both}
@keyframes spIn{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:none}}
.sp-logo{display:flex;flex-direction:column;align-items:center;gap:14px}
.sp-ring{width:86px;height:86px;border-radius:50%;border:2px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:38px;position:relative;background:var(--card);box-shadow:var(--glow2);animation:rpulse 2.5s ease-in-out infinite}
@keyframes rpulse{0%,100%{box-shadow:var(--glow)}50%{box-shadow:var(--glow2)}}
.sp-ring::before{content:'';position:absolute;inset:-7px;border-radius:50%;border:1px solid var(--bdr);animation:rspin 8s linear infinite}
.sp-ring::after{content:'';position:absolute;inset:-14px;border-radius:50%;border:1px dashed var(--bdr);animation:rspin 14s linear infinite reverse}
@keyframes rspin{to{transform:rotate(360deg)}}
.sp-title{font-family:var(--fd);font-size:clamp(22px,5vw,36px);color:var(--A);text-shadow:var(--glow);letter-spacing:2px;text-align:center;line-height:1.1}
.sp-tag{font-size:10px;color:var(--txt2);letter-spacing:3px;text-transform:uppercase;margin-top:-14px;text-align:center}
.sp-card{width:100%;background:var(--card);border:1px solid var(--bdr2);border-radius:20px;padding:26px;box-shadow:var(--glow),0 24px 60px rgba(0,0,0,.3)}
.sp-card h2{font-family:var(--fd);font-size:14px;color:var(--A);margin-bottom:6px;letter-spacing:1px}
[data-theme="girly"] .sp-card h2{font-family:'Quicksand',sans-serif;font-weight:700;font-size:17px}
.sp-card p{color:var(--txt2);font-size:12px;margin-bottom:20px;line-height:1.75;white-space:pre-line}
.sp-lbl{display:block;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.ni-wrap{position:relative;margin-bottom:18px}
.ni-ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none}
#ni{width:100%;background:var(--inp);border:1.5px solid var(--bdr);border-radius:12px;padding:14px 16px 14px 46px;color:var(--txt);font-family:var(--fb);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
#ni:focus{border-color:var(--A);box-shadow:var(--glow)}
#ni::placeholder{color:var(--txt3)}
#ni.err{border-color:#ff4444;animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.sp-themes{display:flex;gap:8px;margin-bottom:20px}
.stb{flex:1;padding:11px 6px;border-radius:12px;border:2px solid var(--bdr);background:var(--inp);color:var(--txt2);cursor:pointer;font-family:var(--fb);font-size:10.5px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.stb span:first-child{font-size:21px}
.stb:hover,.stb:active{border-color:var(--A);color:var(--A)}
.stb.active{border-color:var(--A);color:var(--A);background:var(--card);box-shadow:var(--glow)}
.sp-btn{width:100%;padding:15px;border:none;border-radius:12px;background:var(--A);color:#000;font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
[data-theme="girly"] .sp-btn{color:#fff;font-family:'Quicksand',sans-serif;font-weight:700;font-size:16px;letter-spacing:1px}
.sp-btn:active{transform:scale(.97)}

/* ══ APP SHELL ══ */
#app{
  position:fixed;inset:0;z-index:1;
  display:none;
  flex-direction:row;
}

/* ══ SIDEBAR ══ */
#sidebar{
  width:var(--sidebar-w);
  background:var(--sidebar-bg);
  border-right:1px solid var(--sidebar-bdr);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  overflow:hidden;
  transition:transform .3s cubic-bezier(0.4,0,0.2,1),opacity .3s;
  z-index:50;
}
#sidebar.hidden-mobile{
  display:none;
}
.sb-head{
  padding:14px 14px 10px;
  border-bottom:1px solid var(--sidebar-bdr);
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.sb-title{
  font-family:var(--fd);
  font-size:11px;
  color:var(--A);
  letter-spacing:1.5px;
  flex:1;
}
.sb-new-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--A);color:#000;
  border:none;border-radius:8px;
  padding:7px 11px;
  font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
  flex-shrink:0;
}
.sb-new-btn:active{transform:scale(.95)}
#chat-list{
  flex:1;
  overflow-y:auto;
  padding:8px;
  display:flex;
  flex-direction:column;
  gap:4px;
}
#chat-list::-webkit-scrollbar{width:3px}
#chat-list::-webkit-scrollbar-thumb{background:var(--sb);border-radius:3px}
.cl-item{
  display:flex;align-items:center;gap:8px;
  padding:10px 11px;
  border-radius:10px;
  border:1px solid transparent;
  cursor:pointer;
  transition:all .18s;
  -webkit-tap-highlight-color:transparent;
  min-width:0;
}
.cl-item:hover{background:var(--card);border-color:var(--bdr)}
.cl-item.active{background:var(--card);border-color:var(--bdr2);box-shadow:var(--glow)}
.cl-ico{font-size:14px;flex-shrink:0}
.cl-meta{flex:1;min-width:0}
.cl-name{
  font-size:12px;font-weight:600;color:var(--txt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.3;
}
.cl-item.active .cl-name{color:var(--A)}
.cl-sub{font-size:10px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-del{
  background:none;border:none;cursor:pointer;
  color:var(--txt3);font-size:14px;padding:4px;border-radius:5px;
  opacity:0;transition:all .18s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.cl-item:hover .cl-del{opacity:1}
.cl-del:hover{color:#ff4444;background:rgba(255,68,68,.1)}
.sb-foot{
  padding:12px 14px;
  border-top:1px solid var(--sidebar-bdr);
  font-size:10px;color:var(--txt3);
  text-align:center;
  flex-shrink:0;
}

/* Sidebar overlay for mobile */
#sb-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  z-index:49;
  backdrop-filter:blur(2px);
}

/* ══ MAIN PANEL ══ */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
  position:relative;
}

/* HEADER */
header{
  background:var(--hg);
  border-bottom:1px solid var(--bdr2);
  padding:11px 18px;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;position:relative;overflow:hidden;
}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--A),transparent);animation:lp 4s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:.4;transform:scaleX(.5)}50%{opacity:1;transform:scaleX(1)}}
#sb-toggle{
  display:none;
  background:none;border:none;
  color:var(--A);font-size:20px;cursor:pointer;
  padding:4px 8px 4px 0;
  -webkit-tap-highlight-color:transparent;
}
.h-logo{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.h-ico{width:40px;height:40px;border-radius:10px;border:1px solid var(--bdr2);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:var(--glow)}
.h-ttl{display:flex;flex-direction:column}
.h-t1{font-family:var(--fd);font-size:15px;font-weight:700;color:var(--A);letter-spacing:1px;line-height:1;text-shadow:var(--glow)}
.h-t2{font-size:9px;color:var(--txt3);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.h-greet{font-size:11.5px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.h-greet strong{color:var(--A)}
.online{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--txt2);flex-shrink:0}
.odot{width:7px;height:7px;border-radius:50%;background:var(--A3);animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.h-themes{display:flex;gap:4px}
.hbtn{width:30px;height:30px;border-radius:8px;border:2px solid transparent;background:var(--card);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .18s;-webkit-tap-highlight-color:transparent}
.hbtn.active{border-color:var(--A);box-shadow:var(--glow)}

/* ── CHAT AREA ── */
#chat{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:22px 18px;
  display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-track{background:transparent}
#chat::-webkit-scrollbar-thumb{background:var(--sb);border-radius:3px}

/* WELCOME */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px 14px;gap:16px;min-height:260px;flex:1}
.wl-ico{font-size:56px;animation:wf 3s ease-in-out infinite}
@keyframes wf{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:7px;width:100%;max-width:600px}
.qbtn{background:var(--card);border:1px solid var(--bdr);color:var(--txt2);padding:10px 12px;border-radius:11px;cursor:pointer;font-family:var(--fb);font-size:11px;text-align:left;transition:all .2s;line-height:1.45;-webkit-tap-highlight-color:transparent}
.qbtn:hover{border-color:var(--A);color:var(--A);box-shadow:var(--glow)}
.qbtn:active{transform:scale(.97)}

/* MESSAGES */
.msg{display:flex;gap:10px;max-width:min(84%, 680px);animation:mi .3s ease-out;min-width:0;width:fit-content}
.msg.ai{align-self:flex-start;max-width:min(90%, 720px);width:auto}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}
.av{width:34px;height:34px;border-radius:50%;border:1px solid var(--bdr);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;align-self:flex-end;box-shadow:var(--glow)}
.bubble{padding:12px 16px;border-radius:18px;font-size:13.5px;line-height:1.75;word-break:break-word;font-family:var(--fc);position:relative;min-width:0;overflow:hidden}
.msg.user .bubble{background:var(--ubbl);color:#fff;border-radius:18px 18px 4px 18px}
[data-theme="hack"] .msg.user .bubble{border:1px solid var(--A);box-shadow:inset 0 0 25px rgba(0,255,65,.08)}
.msg.ai .bubble{background:var(--abbl);border:1px solid var(--abblb);color:var(--txt);border-radius:18px 18px 18px 4px;box-shadow:var(--glow)}
.bubble pre{
  background:var(--inp);border:1px solid var(--bdr);border-radius:10px;
  padding:14px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  margin:10px 0;
  font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;
  /* Critical: prevent pre from expanding parent */
  max-width:100%;
  min-width:0;
  display:block;
  white-space:pre;
  word-wrap:normal;
  word-break:normal;
}
.bubble pre::-webkit-scrollbar{height:3px}
.bubble pre::-webkit-scrollbar-track{background:transparent}
.bubble pre::-webkit-scrollbar-thumb{background:var(--sb);border-radius:3px}
.bubble code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--inp);padding:2px 7px;border-radius:5px;color:var(--A)}
.bubble pre code{background:transparent;padding:0;white-space:pre;word-break:normal}
.bubble strong{color:var(--A);font-weight:700}
.bubble em{color:var(--txt2)}

/* Copy button for AI messages */
.bubble-actions{
  display:flex;gap:6px;margin-top:9px;
  opacity:0;transition:opacity .2s;
}
.msg.ai:hover .bubble-actions,
.msg.ai:focus-within .bubble-actions{opacity:1}
.copy-btn{
  display:flex;align-items:center;gap:5px;
  background:var(--inp);border:1px solid var(--bdr);
  color:var(--txt2);padding:5px 10px;border-radius:7px;
  font-family:var(--fb);font-size:10.5px;cursor:pointer;
  transition:all .18s;-webkit-tap-highlight-color:transparent;
}
.copy-btn:hover{border-color:var(--A);color:var(--A)}
.copy-btn.copied{border-color:var(--A3);color:var(--A3)}

/* Typing indicator */
.typing-b{display:flex;align-items:center;gap:5px;padding:16px 18px}
.td{width:7px;height:7px;border-radius:50%;background:var(--A);animation:tda 1.3s ease-in-out infinite}
.td:nth-child(2){animation-delay:.15s}.td:nth-child(3){animation-delay:.3s}
@keyframes tda{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-7px);opacity:1}}

/* ── INPUT AREA ── */
.inp-area{
  padding:12px 18px 16px;
  border-top:1px solid var(--bdr);
  background:var(--bg2);
  flex-shrink:0;
  /* iOS safe area */
  padding-bottom:max(16px, env(safe-area-inset-bottom));
}
.inp-wrap{display:flex;gap:9px;align-items:flex-end}
#mi{
  flex:1;background:var(--inp);border:1.5px solid var(--bdr);border-radius:16px;
  padding:13px 16px;color:var(--txt);font-family:var(--fc);font-size:15px;
  outline:none;resize:none;min-height:50px;max-height:140px;line-height:1.55;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
  /* Prevent iOS zoom */
  font-size:max(16px, 14px);
}
#mi:focus{border-color:var(--A);box-shadow:var(--glow)}
#mi::placeholder{color:var(--txt3)}
#send{
  width:50px;height:50px;border-radius:14px;background:var(--A);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;-webkit-tap-highlight-color:transparent;
}
#send:active{transform:scale(.92)}
#send:disabled{opacity:.35;cursor:not-allowed;transform:none}
#send svg{width:22px;height:22px}
[data-theme="tech"] #send svg,[data-theme="hack"] #send svg{fill:#000}
[data-theme="girly"] #send svg{fill:#fff}
.inp-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding:0 2px}
.inp-hint{font-size:10px;color:var(--txt3)}
.clr{background:none;border:none;cursor:pointer;font-size:11px;color:var(--txt3);font-family:var(--fb);transition:color .2s;-webkit-tap-highlight-color:transparent}
.clr:hover,.clr:active{color:var(--A)}

/* Attach image button */
.attach-btn{
  width:44px;height:50px;border-radius:12px;
  background:var(--inp);border:1.5px solid var(--bdr);
  color:var(--txt2);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.attach-btn:hover,.attach-btn:active{border-color:var(--A);color:var(--A)}
.attach-btn.has-img{border-color:var(--A);background:var(--card);box-shadow:var(--glow)}

/* Image preview thumbnail */
.img-thumb-wrap{position:relative;display:inline-flex}
.img-thumb{
  width:56px;height:56px;object-fit:cover;
  border-radius:10px;border:1.5px solid var(--bdr2);
  display:block;
}
.img-thumb-rm{
  position:absolute;top:-6px;right:-6px;
  width:20px;height:20px;border-radius:50%;
  background:#ff4444;color:#fff;
  border:none;cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}

/* Image inside bubble */
.bubble-img{
  max-width:100%;max-height:260px;
  border-radius:12px;margin-bottom:8px;
  border:1px solid var(--bdr);display:block;
}

/* SVG diagram container */

  margin-top:10px;
  background:var(--inp);
  border:1px solid var(--bdr2);
  border-radius:12px;
  overflow:hidden;
  max-width:100%;
}
.diagram-wrap svg{
  width:100%;height:auto;display:block;
}

/* ═══════════════════════════════════════
   SESSION MANAGEMENT
═══════════════════════════════════════ */
function newChat(silent){
  const id = genId();
  const session = {
    id, name:'Chat Baru', history:[], ts: Date.now()
  };
  sessions.unshift(session);
  activeId = id;
  saveToStorage();
  renderSidebar();
  showWelcome();
  if(!silent) closeSidebar();
}

function switchChat(id){
  if(busy) return;
  activeId = id;
  renderSidebar();
  const s = activeSession();
  if(!s) return;
  const chat = document.getElementById('chat');
  chat.innerHTML='';
  if(s.history.length===0){
    showWelcome();
  } else {
    s.history.forEach(m=>{
      if(m.role==='user') addBubble('user',m.content,false);
      else if(m.role==='assistant') addBubble('ai',m.content,false);
    });
  }
  closeSidebar();
}

function deleteChat(id, e){
  e.stopPropagation();
  sessions = sessions.filter(s=>s.id!==id);
  saveToStorage();
  if(activeId===id){
    if(sessions.length>0){ activeId=sessions[0].id; switchChat(activeId); }
    else newChat(true);
  } else {
    renderSidebar();
  }
}

function clearCurrentChat(){
  const s = activeSession(); if(!s) return;
  s.history=[];
  s.name='Chat Baru';
  saveToStorage();
  renderSidebar();
  showWelcome();
}

function renderSidebar(){
  const list = document.getElementById('chat-list');
  list.innerHTML='';
  sessions.forEach(s=>{
    const item = document.createElement('div');
    item.className = 'cl-item' + (s.id===activeId?' active':'');
    item.onclick = ()=>switchChat(s.id);
    const lastMsg = s.history.filter(m=>m.role==='user').pop();
    const preview = lastMsg ? lastMsg.content.slice(0,38)+'...' : 'Belum ada pesan';
    const ico = theme==='hack'?'▶':theme==='girly'?'💬':'💬';
    item.innerHTML=`
      <span class="cl-ico">${ico}</span>
      <div class="cl-meta">
        <div class="cl-name">${esc(s.name)}</div>
        <div class="cl-sub">${esc(preview)}</div>
      </div>
      <button class="cl-del" onclick="deleteChat('${s.id}',event)" title="Hapus">✕</button>
    `;
    list.appendChild(item);
  });
}

function handleImgSelect(e){
  const file = e.target.files[0]; if(!file) return;
  if(!file.type.startsWith('image/')){ alert('File harus berupa gambar!'); return; }
  if(file.size > 10 * 1024 * 1024){ alert('Gambar maksimal 10MB ya!'); return; }

  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    const base64 = dataUrl.split(',')[1];
    pendingImg = { base64, mimeType: file.type, previewUrl: dataUrl };
    renderImgPreview();
  };
  reader.readAsDataURL(file);
  // Reset file input so same file can be re-selected
  e.target.value = '';
}

function renderImgPreview(){
  const wrap = document.getElementById('img-preview-wrap');
  const inner = document.getElementById('img-preview-inner');
  const btn = document.getElementById('img-btn');
  if(!pendingImg){ wrap.style.display='none'; btn.classList.remove('has-img'); return; }
  wrap.style.display='block';
  btn.classList.add('has-img');
  inner.innerHTML = `
    <div class="img-thumb-wrap">
      <img class="img-thumb" src="${pendingImg.previewUrl}" alt="preview">
      <button class="img-thumb-rm" onclick="clearPendingImg()" title="Hapus">✕</button>
    </div>
    <span style="font-size:11px;color:var(--txt2)">Gambar siap dikirim • ketik pertanyaan atau langsung kirim</span>
  `;
}

function clearPendingImg(){
  pendingImg = null;
  renderImgPreview();
}

/* ═══════════════════════════════════════
   CHAT BUBBLES
═══════════════════════════════════════ */
function addBubble(role, text, scroll=true, imgUrl=null){
  const w = document.getElementById('welcome'); if(w) w.remove();
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div'); wrap.className=`msg ${role}`;
  const av = document.createElement('div'); av.className='av';
  av.textContent = role==='user'?'👤':TC[theme].ico;
  const bbl = document.createElement('div'); bbl.className='bubble';

  // Show image if attached to user message
  if(imgUrl){
    const img = document.createElement('img');
    img.src = imgUrl; img.className='bubble-img'; img.alt='gambar';
    bbl.appendChild(img);
  }

  const textNode = document.createElement('div');
  textNode.innerHTML = fmt(text);
  bbl.appendChild(textNode);

  // Copy button only for AI
  if(role==='ai'){
    const actions = document.createElement('div');
    actions.className='bubble-actions';
    const btn = document.createElement('button');
    btn.className='copy-btn';
    btn.innerHTML='📋 Salin';
    btn.onclick=()=>copyMsg(text, btn);
    actions.appendChild(btn);
    bbl.appendChild(actions);
  }

  wrap.appendChild(av); wrap.appendChild(bbl);
  chat.appendChild(wrap);
  if(scroll) chat.scrollTop = chat.scrollHeight;
}

function copyMsg(text, btn){
  // Strip markdown for clean copy
  const plain = text
    .replace(/```[\w]*\n?([\s\S]*?)```/g,'$1')
    .replace(/`([^`]+)`/g,'$1')
    .replace(/\*\*(.*?)\*\*/g,'$1')
    .replace(/\*(.*?)\*/g,'$1');
  navigator.clipboard.writeText(plain).then(()=>{
    btn.innerHTML='✅ Disalin!';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.innerHTML='📋 Salin'; btn.classList.remove('copied'); }, 2000);
  }).catch(()=>{
    // fallback
    const ta = document.createElement('textarea');
    ta.value=plain; ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.innerHTML='✅ Disalin!';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.innerHTML='📋 Salin'; btn.classList.remove('copied'); }, 2000);
  });
}

function addTyping(){
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div'); wrap.className='msg ai'; wrap.id='typ';
  const av = document.createElement('div'); av.className='av'; av.textContent=TC[theme].ico;
  const bbl = document.createElement('div'); bbl.className='bubble';
  bbl.innerHTML=`<div class="typing-b"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  wrap.appendChild(av); wrap.appendChild(bbl);
  chat.appendChild(wrap); chat.scrollTop=chat.scrollHeight;
}
function rmTyping(){ const e=document.getElementById('typ'); if(e)e.remove(); }

/* counter for unique code block IDs */
let codeBlockId = 0;

function fmt(t){
  // SVG diagram — render inline
  t = t.replace(/```svg\n?([\s\S]*?)```/gi, (_, svgContent) => {
    const clean = svgContent.trim();
    return `<div class="diagram-wrap">${clean}</div>`;
  });

  // Code blocks with toolbar
  t = t.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) => {
    const id = 'cb_' + (++codeBlockId);
    const langLabel = lang ? lang.toLowerCase() : 'code';
    const escaped = esc(code.trim());
    const rawCode = code.trim();

    // Determine if previewable: html, or contains <!DOCTYPE / <html / full css+html combos
    const isHtml = langLabel === 'html' || langLabel === 'htm'
      || rawCode.includes('<!DOCTYPE') || rawCode.includes('<html')
      || (rawCode.includes('<body') && rawCode.includes('<head'));
    const isCss = langLabel === 'css';
    const isJs  = langLabel === 'javascript' || langLabel === 'js';
    const canPreview = isHtml || isCss || isJs;

    // Store raw code for preview
    const safeCode = btoa(unescape(encodeURIComponent(rawCode)));

    const previewBtn = canPreview
      ? `<button class="code-preview-btn" onclick="openPreview('${id}')">▶ Preview</button>`
      : '';

    return `<div class="code-block-wrap" id="${id}-wrap">
      <div class="code-block-toolbar">
        <span class="code-lang">${langLabel}</span>
        <div class="code-actions">
          <button class="code-copy-btn" onclick="copyCode('${id}')">📋 Salin</button>
          ${previewBtn}
        </div>
      </div>
      <pre><code id="${id}" data-code="${safeCode}" data-lang="${langLabel}">${escaped}</code></pre>
    </div>`;
  });

  t = t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t = t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*(.*?)\*/g,'<em>$1</em>');
  t = t.replace(/\n/g,'<br>');
  return t;
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

/* ═══════════════════════════════════════
   SEND MESSAGE
═══════════════════════════════════════ */
async function sendMsg(){
  const inp = document.getElementById('mi');
  const text = inp.value.trim();
  const hasImg = !!pendingImg;
  if(!text && !hasImg) return;
  if(busy) return;
  const s = activeSession(); if(!s) return;

  const msgText = text || (hasImg ? 'Tolong analisis gambar ini.' : '');
  const imgSnapshot = pendingImg ? {...pendingImg} : null;

  inp.value=''; inp.style.height='auto';
  clearPendingImg();

  // Show user bubble with optional image
  addBubble('user', msgText, true, imgSnapshot?.previewUrl || null);

  // Build history entry — if image, store as text only for history (vision only in current turn)
  s.history.push({role:'user', content: msgText});

  if(s.name==='Chat Baru' && s.history.filter(m=>m.role==='user').length===1){
    s.name = msgText.slice(0,30) + (msgText.length>30?'…':'');
  }
  s.ts = Date.now();
  saveToStorage(); renderSidebar();

  busy=true;
  document.getElementById('send').disabled=true;
  document.getElementById('img-btn').disabled=true;
  addTyping();
  if(window.innerWidth<=720) inp.blur();

  try{
    let messages;
    const useVision = !!imgSnapshot;
    const modelToUse = useVision ? MODEL_VISION : MODEL;

    if(useVision){
      // Vision: current turn with image content array, previous history as text
      const prevHistory = s.history.slice(0,-1).slice(-20).map(m=>({
        role: m.role==='assistant'?'assistant':'user',
        content: m.content
      }));
      messages = [
        {role:'system', content: buildSP(userName)},
        ...prevHistory,
        {
          role:'user',
          content:[
            { type:'image_url', image_url:{ url:`data:${imgSnapshot.mimeType};base64,${imgSnapshot.base64}` } },
            { type:'text', text: msgText }
          ]
        }
      ];
    } else {
      messages = [
        {role:'system', content:buildSP(userName)},
        ...s.history.slice(-24).map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.content}))
      ];
    }

    const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROQ_KEY}`},
      body:JSON.stringify({
        model: modelToUse,
        messages,
        max_tokens:2048, temperature:.72
      })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error?.message||`HTTP ${res.status}`);
    const reply = data.choices?.[0]?.message?.content||'Maaf, tidak ada respons.';
    s.history.push({role:'assistant', content:reply});
    saveToStorage();
    rmTyping(); addBubble('ai', reply);
  } catch(err){
    rmTyping();
    let msg=`❌ Error: ${err.message}`;
    if(err.message.includes('401')||err.message.includes('invalid_api_key'))
      msg='❌ API Key tidak valid. Hubungi admin!';
    else if(err.message.includes('429'))
      msg='⚠️ Terlalu banyak request. Tunggu sebentar ya!';
    else if(err.message.includes('fetch')||err.message.includes('Network')||err.message.includes('Failed'))
      msg='🌐 Gagal konek ke server. Cek koneksi internet!';
    addBubble('ai',msg); s.history.pop();
  } finally{
    busy=false;
    document.getElementById('send').disabled=false;
    document.getElementById('img-btn').disabled=false;
    if(window.innerWidth>720) inp.focus();
  }
}

function sendQ(t){ document.getElementById('mi').value=t; sendMsg(); }

/* ═══════════════════════════════════════
   PREVIEW MODAL
═══════════════════════════════════════ */
let previewCode = '';
let currentDevice = 'desktop';

function openPreview(id){
  const el = document.getElementById(id); if(!el) return;
  const lang = el.dataset.lang;
  const raw  = decodeURIComponent(escape(atob(el.dataset.code)));

  let html = raw;
  // If it's CSS-only, wrap it
  if(lang === 'css'){
    html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>${raw}</style></head>
<body style="margin:16px;font-family:sans-serif">
<h2>CSS Preview</h2><p>Ini adalah preview CSS kamu.</p>
<div class="container"><p>Contoh konten</p></div>
</body></html>`;
  }
  // If it's JS-only, wrap it
  else if(lang === 'javascript' || lang === 'js'){
    html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>body{background:#111;color:#0f0;font-family:'Courier New',monospace;padding:20px}
#output{background:#000;border:1px solid #0f0;border-radius:8px;padding:16px;min-height:100px;white-space:pre-wrap}
h3{color:#0f0;margin-bottom:10px;font-size:13px;letter-spacing:2px}
</style></head>
<body><h3>▶ OUTPUT CONSOLE</h3><div id="output"></div>
<script>
const _out=document.getElementById('output');
const _log=console.log.bind(console);
console.log=(...a)=>{_out.textContent+=a.join(' ')+'\\n';_log(...a)};
console.error=(...a)=>{_out.textContent+='❌ '+a.join(' ')+'\\n'};
try{${raw}}catch(e){_out.textContent+='❌ Error: '+e.message}
<\/script></body></html>`;
  }
  // If it doesn't have DOCTYPE, try to make it a full page
  else if(!raw.includes('<!DOCTYPE') && !raw.includes('<html')){
    html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
</head><body>${raw}</body></html>`;
  }

  previewCode = html;
  const modal = document.getElementById('preview-modal');
  const frame = document.getElementById('preview-frame');
  frame.srcdoc = html;
  setDevice(currentDevice);
  modal.classList.add('open');
  document.getElementById('preview-url').textContent = '📄 preview · ' + (lang.toUpperCase()) + ' · TKJ·AI';

  // Close on backdrop click
  modal.onclick = e => { if(e.target === modal) closePreview(); };

  // Close on Escape
  document.addEventListener('keydown', escClose);
}

function escClose(e){ if(e.key==='Escape') closePreview(); }

function closePreview(){
  const modal = document.getElementById('preview-modal');
  modal.classList.remove('open');
  document.removeEventListener('keydown', escClose);
  // Clear iframe to stop any running scripts
  setTimeout(()=>{ document.getElementById('preview-frame').srcdoc=''; },300);
}

function setDevice(d){
  currentDevice = d;
  const wrap = document.getElementById('preview-frame-wrap');
  wrap.className = 'device-' + d;
  document.querySelectorAll('.dev-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('dev-'+d)?.classList.add('active');
}

function openPreviewNewTab(){
  if(!previewCode) return;
  const blob = new Blob([previewCode], {type:'text/html'});
  const url  = URL.createObjectURL(blob);
  window.open(url, '_blank');
  setTimeout(()=>URL.revokeObjectURL(url), 10000);
}

/* ═══════════════════════════════════════
   MATRIX RAIN (Hacking theme)
═══════════════════════════════════════ */
function startMx(){
  const c=document.getElementById('fx-canvas'), ctx=c.getContext('2d');
  c.width=window.innerWidth; c.height=window.innerHeight;
  const cols=Math.floor(c.width/16), drops=Array(cols).fill(1);
  const ch='01アイウエオカキクケコ0011001ABCDEF><{}[]01010011';
  if(mxId) clearInterval(mxId);
  mxId=setInterval(()=>{
    ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle='#00ff41';ctx.font='13px monospace';
    drops.forEach((y,i)=>{
      ctx.fillText(ch[Math.floor(Math.random()*ch.length)],i*16,y*16);
      if(y*16>c.height&&Math.random()>.975)drops[i]=0;drops[i]++;
    });
  },45);
}
function stopMx(){
  if(mxId){clearInterval(mxId);mxId=null;}
  const c=document.getElementById('fx-canvas');
  if(c) c.getContext('2d').clearRect(0,0,c.width,c.height);
}
window.addEventListener('resize',()=>{
  if(theme==='hack'&&mxId){stopMx();startMx();}
});
